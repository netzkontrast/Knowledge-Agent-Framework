name: Release Knowledge Agents

# Builds one release zip PER example agent in examples/. Each example that
# contains a langdock-deploy/ package is assembled into <example-name>.zip
# (e.g. examples/iw-little-data/ -> iw-little-data.zip) and published to the
# GitHub Releases tab.
#
# Triggers:
#   - push a tag matching v*           -> release named after the tag
#   - manual run (workflow_dispatch)   -> release named after the "version" input

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v1.0)"
        required: true
        default: "v1.0"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build a zip for every example
        id: build
        run: |
          set -euo pipefail
          rm -rf dist && mkdir -p dist
          shopt -s nullglob
          built=0
          for EX in examples/*/; do
            NAME="$(basename "$EX")"
            DEPLOY="$EX/langdock-deploy"
            [ -d "$DEPLOY/knowledge" ] || { echo "skip $NAME (no langdock-deploy/knowledge)"; continue; }

            echo "::group::Validate $NAME"
            ( cd "$EX" && bash tools/check_schema.sh --all )
            ( cd "$EX" && bash tools/check_prompt_size.sh )
            if grep -rlP '[\x{1F000}-\x{1FAFF}\x{2600}-\x{26FF}\x{2700}-\x{27BF}\x{2B00}-\x{2BFF}\x{FE0F}]' "$DEPLOY"/knowledge/*.md; then
              echo "::error::Pictographic emoji found in $NAME knowledge files — aborting."
              exit 1
            fi
            echo "::endgroup::"

            STAGE="dist/$NAME"
            mkdir -p "$STAGE/knowledge" "$STAGE/provenance"
            # Lean deploy core
            for f in AGENT_PROMPT.md CONVERSATION_STARTERS.md README.md CHANGELOG.md LICENSE; do
              [ -f "$DEPLOY/$f" ] && cp "$DEPLOY/$f" "$STAGE/"
            done
            [ -f "$EX/INSTALL.md" ] && cp "$EX/INSTALL.md" "$STAGE/"
            cp "$DEPLOY"/knowledge/*.md "$STAGE/knowledge/"
            # Provenance (reference only — never uploaded to the knowledge folder)
            [ -f "$DEPLOY/provenance-README.md" ] && cp "$DEPLOY/provenance-README.md" "$STAGE/provenance/README.md"
            [ -d "$EX/data/sources" ]  && cp -r "$EX/data/sources"  "$STAGE/provenance/sources"
            [ -d "$EX/data/research" ] && cp -r "$EX/data/research" "$STAGE/provenance/research"
            if ls "$EX"/data/extracts/T*.md >/dev/null 2>&1; then
              mkdir -p "$STAGE/provenance/extracts" && cp "$EX"/data/extracts/T*.md "$STAGE/provenance/extracts/"
            fi
            find "$STAGE" -name '*.bak' -delete

            ( cd dist && zip -rq "$NAME.zip" "$NAME" && rm -rf "$NAME" )
            echo "built dist/$NAME.zip"
            built=$((built+1))
          done
          [ "$built" -gt 0 ] || { echo "::error::No releasable examples found."; exit 1; }
          echo "count=$built" >> "$GITHUB_OUTPUT"
          ls -la dist/

      - name: Upload workflow artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-agents-${{ steps.ver.outputs.version }}
          path: dist/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          if gh release view "$VER" >/dev/null 2>&1; then
            echo "Release $VER exists — uploading assets (clobber)."
            gh release upload "$VER" dist/*.zip --clobber
          else
            echo "Creating release $VER."
            gh release create "$VER" dist/*.zip \
              --title "Knowledge Agents $VER" \
              --notes "Knowledge agent release $VER — one zip per example in examples/."
          fi
